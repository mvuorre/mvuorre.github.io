- title: Understanding the roles of digital technologies in psychological functioning
  url:
  location: Tilburg University (Tilburg, NL)
  date: 2024-06-24
  type: presentation
  abstract: |
    Digital technologies have impacted nearly all domains of human life. Yet, the current state of research does not adequately address hotly debated worries and hopes about how digital technologies might psychologically impact their users. I present results from my attempts at studying how the adoption and use of digital technologies, the internet, and social media are associated with psychological well-being on a global scale. Unlike past negative results from studies' that focused on WEIRD populations, I find little evidence in favor of widespread harms. In many cases, internet adoption and use predict greater psychological well-being.

    The current emphasis on digital technologies' effects is best seen in the context of a repeated cycle of technology panics: Opportunistic, myopic, and ineffective research is carried out on novel technologies while inconclusive results regarding prior questions are forgotten. To do better, widespread methodological and theoretical advances are needed. The same technologies that inspire current societal worries might facilitate a more robust understanding of psychological functioning in the digital age, if appropriately used.
- title: Understanding the roles of digital technologies in psychological functioning
  url:
  location: Tilburg Experience Sampling Center, Tilburg University (Tilburg, NL)
  date: 2023-03-27
  type: presentation
  abstract: |
    Video game play is an extremely popular form of leisure, yet the scientific understanding of games' relations to psychosocial functioning is at its infancy. To better understand games' roles in people's lives, we need not only more experimentation, but critically, more observation and description of play as it occurs naturally. We describe a data set of ~10,000 players, from 39 countries, and ~700,000 responses to psychological instruments within the video game PowerWash Simulator. These data were collected in collaboration with the game's developer FuturLab Inc., who published a modified version of the game. This research edition queried participants' well-being and motivational experiences during play six times each hour using an in-game messaging system, and along with the survey responses, logged detailed telemetry on player behavior, achievements, and other in-game events. The resulting combination of detailed play behavior and event data, and players' high temporal resolution responses to psychological instruments within the game itself is suitable for both detailed desciptive studies and in-depth statistical modelling of video game play and its relations to players' psychological states.
